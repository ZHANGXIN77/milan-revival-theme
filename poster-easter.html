<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>复活节联合崇拜 - 在场</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #111;
    font-family: 'Noto Sans SC', sans-serif;
  }

  .poster {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    background: #08090c;
  }

  /* ===== BACKGROUND SVG SCENE ===== */
  .scene-bg {
    position: absolute;
    inset: 0;
  }

  .scene-bg svg {
    width: 100%;
    height: 100%;
  }

  /* Hopeful dawn glow overlays — added cool-white core for cold/warm contrast */
  .glow-hope {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 25% 14% at 50% 48%, rgba(220, 240, 255, 0.13) 0%, transparent 100%),
      radial-gradient(ellipse 55% 30% at 50% 48%, rgba(255, 225, 150, 0.22) 0%, transparent 100%),
      radial-gradient(ellipse 40% 20% at 50% 50%, rgba(255, 245, 220, 0.12) 0%, transparent 100%),
      radial-gradient(ellipse 80% 50% at 50% 44%, rgba(220, 180, 100, 0.08) 0%, transparent 100%);
    z-index: 2;
  }

  /* Particles */
  .particles {
    position: absolute;
    inset: 0;
    z-index: 4;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 235, 180, 0.8), transparent 70%);
    animation: drift 10s ease-in-out infinite;
  }

  .particle:nth-child(1)  { width: 5px;  height: 5px;  top: 28%; left: 22%; animation-delay: 0s;   animation-duration: 9s; }
  .particle:nth-child(2)  { width: 8px;  height: 8px;  top: 36%; left: 68%; animation-delay: 1s;   animation-duration: 11s; }
  .particle:nth-child(3)  { width: 4px;  height: 4px;  top: 44%; left: 30%; animation-delay: 2.5s; animation-duration: 8s; }
  .particle:nth-child(4)  { width: 6px;  height: 6px;  top: 32%; left: 52%; animation-delay: 0.7s; animation-duration: 10s; }
  .particle:nth-child(5)  { width: 10px; height: 10px; top: 40%; left: 78%; animation-delay: 3s;   animation-duration: 12s; }
  .particle:nth-child(6)  { width: 7px;  height: 7px;  top: 22%; left: 45%; animation-delay: 1.5s; animation-duration: 8s; }
  .particle:nth-child(7)  { width: 3px;  height: 3px;  top: 50%; left: 40%; animation-delay: 4s;   animation-duration: 9s; }
  .particle:nth-child(8)  { width: 6px;  height: 6px;  top: 26%; left: 62%; animation-delay: 0.3s; animation-duration: 10s; }
  .particle:nth-child(9)  { width: 4px;  height: 4px;  top: 48%; left: 56%; animation-delay: 2s;   animation-duration: 7s; }
  .particle:nth-child(10) { width: 5px;  height: 5px;  top: 35%; left: 36%; animation-delay: 3.5s; animation-duration: 11s; }
  .particle:nth-child(11) { width: 8px;  height: 8px;  top: 42%; left: 48%; animation-delay: 1.2s; animation-duration: 9.5s; }
  .particle:nth-child(12) { width: 3px;  height: 3px;  top: 30%; left: 82%; animation-delay: 2.8s; animation-duration: 8.5s; }

  @keyframes drift {
    0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.25; }
    40% { transform: translateY(-18px) translateX(6px) scale(1.4); opacity: 0.75; }
    70% { transform: translateY(-10px) translateX(-4px) scale(1.1); opacity: 0.45; }
  }

  /* Vignette - lighter to preserve hope */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 46%, transparent 35%, rgba(6, 7, 10, 0.65) 100%);
    z-index: 5;
    pointer-events: none;
  }

  /* Grain */
  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    z-index: 50;
    pointer-events: none;
  }

  /* ===== CONTENT ===== */
  .content {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Top label */
  .event-label {
    margin-top: 88px;
    text-align: center;
  }

  .churches {
    font-weight: 300;
    font-size: 26px;
    color: rgba(210, 200, 185, 0.55);
    letter-spacing: 3px;
    margin-bottom: 12px;
  }

  .event-type {
    font-weight: 400;
    font-size: 30px;
    color: rgba(225, 215, 195, 0.72);
    letter-spacing: 6px;
  }

  /* Easter line */
  .easter-line {
    margin-top: 36px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .el-bar {
    width: 70px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(220, 195, 140, 0.45));
  }

  .el-bar.r {
    background: linear-gradient(90deg, rgba(220, 195, 140, 0.45), transparent);
  }

  .el-text {
    font-weight: 300;
    font-size: 22px;
    color: rgba(220, 195, 140, 0.55);
    letter-spacing: 10px;
  }

  /* ===== OVERLAPPING TITLE ===== */
  .title-area {
    position: relative;
    width: 560px;
    height: 370px;
    margin-top: 90px;
  }

  .title-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 520px;
    height: 420px;
    background: radial-gradient(ellipse, rgba(255, 220, 130, 0.14) 0%, transparent 70%);
    filter: blur(45px);
  }

  .char {
    font-family: 'Zhi Mang Xing', 'Ma Shan Zheng', cursive;
    font-weight: 400;
    font-size: 300px;
    line-height: 1;
    position: absolute;
    color: transparent;
    -webkit-background-clip: text;
    background-clip: text;
  }

  .char-zai {
    left: 10px;
    top: 8px;
    background-image: linear-gradient(155deg, #fff8e8 0%, #f0d890 25%, #dbb560 50%, #c49540 80%, #a87830 100%);
    z-index: 2;
    filter: drop-shadow(0 0 50px rgba(255, 220, 130, 0.2));
  }

  .char-chang {
    left: 205px;
    top: 58px;
    background-image: linear-gradient(155deg, #fef5e0 0%, #e8c878 25%, #cba048 50%, #a88030 80%, #8a6525 100%);
    z-index: 1;
    filter: drop-shadow(0 0 45px rgba(255, 210, 120, 0.15));
  }

  .char-zai-stroke {
    left: 10px;
    top: 8px;
    z-index: 3;
    -webkit-text-stroke: 1.5px rgba(255, 240, 200, 0.08);
    color: transparent;
    background: none;
    pointer-events: none;
  }

  /* English accent under title */
  .title-en {
    position: absolute;
    bottom: 2px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .title-en-bar {
    flex: 1;
    max-width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(220, 195, 140, 0.3));
  }

  .title-en-bar.r {
    background: linear-gradient(90deg, rgba(220, 195, 140, 0.3), transparent);
  }

  .title-en-text {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    font-size: 17px;
    letter-spacing: 9px;
    color: rgba(210, 190, 145, 0.42);
    text-transform: uppercase;
  }

  /* Subtitle */
  .subtitle {
    margin-top: 38px;
    text-align: center;
  }

  .subtitle-text {
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    font-size: 38px;
    color: rgba(240, 225, 195, 0.85);
    letter-spacing: 5px;
  }

  /* Divider */
  .divider {
    margin-top: 38px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .div-line {
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(220, 195, 140, 0.35));
  }

  .div-line.r {
    background: linear-gradient(90deg, rgba(220, 195, 140, 0.35), transparent);
  }

  .div-dot {
    width: 6px;
    height: 6px;
    background: rgba(220, 195, 140, 0.45);
    transform: rotate(45deg);
  }

  /* Messages */
  .messages {
    margin-top: 42px;
    text-align: center;
  }

  .msg {
    margin-bottom: 0;
    padding: 28px 0;
  }

  .msg-num {
    font-family: 'Noto Serif SC', serif;
    font-weight: 300;
    font-size: 16px;
    color: rgba(200, 160, 80, 0.45);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .msg-title {
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    font-size: 34px;
    color: rgba(240, 225, 195, 0.82);
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .msg-speaker {
    font-weight: 300;
    font-size: 24px;
    color: rgba(210, 190, 145, 0.5);
    letter-spacing: 2px;
  }

  .msg-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 0 auto;
    width: 320px;
  }

  .msg-divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200, 160, 80, 0.2));
  }

  .msg-divider-line.r {
    background: linear-gradient(90deg, rgba(200, 160, 80, 0.2), transparent);
  }

  .msg-divider-cross {
    font-size: 14px;
    color: rgba(200, 160, 80, 0.3);
    letter-spacing: 0;
  }

  /* Scripture verse */
  .scripture {
    margin-top: 35px;
    text-align: center;
    max-width: 900px;
    padding: 0 40px;
    white-space: nowrap;
  }

  .scripture-text {
    font-family: 'Noto Serif SC', serif;
    font-weight: 400;
    font-size: 22px;
    color: rgba(225, 215, 195, 0.55);
    letter-spacing: 1.5px;
    line-height: 1.8;
    font-style: italic;
  }

  .scripture-ref {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 300;
    font-size: 18px;
    color: rgba(210, 190, 145, 0.38);
    letter-spacing: 2px;
    margin-top: 10px;
  }

  /* Bottom info */
  .info {
    position: absolute;
    bottom: 85px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
  }

  .info-date {
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    font-size: 56px;
    color: rgba(245, 232, 200, 0.92);
    letter-spacing: 6px;
    margin-bottom: 20px;
  }

  .info-weekday {
    font-weight: 400;
    font-size: 24px;
    color: rgba(210, 190, 145, 0.55);
    letter-spacing: 5px;
    margin-top: 0;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .info-time {
    font-weight: 600;
    font-size: 36px;
    color: rgba(240, 225, 195, 0.85);
    letter-spacing: 4px;
    margin-bottom: 24px;
  }

  .info-sep {
    width: 50px;
    height: 1px;
    background: rgba(220, 195, 140, 0.3);
    margin: 0 auto 24px;
  }

  .info-loc {
    font-weight: 400;
    font-size: 23px;
    color: rgba(210, 190, 145, 0.5);
    letter-spacing: 1.5px;
  }

  .info-schedule {
    display: flex;
    justify-content: center;
    gap: 0;
    margin: 6px auto 22px;
    border-top: 1px solid rgba(200, 160, 80, 0.12);
    border-bottom: 1px solid rgba(200, 160, 80, 0.12);
    padding: 16px 0;
    width: 560px;
  }

  .sched-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 36px;
    border-right: 1px solid rgba(200, 160, 80, 0.15);
  }

  .sched-item:last-child {
    border-right: none;
  }

  .sched-time {
    font-weight: 400;
    font-size: 20px;
    color: rgba(200, 160, 80, 0.6);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .sched-name {
    font-weight: 300;
    font-size: 22px;
    color: rgba(225, 210, 180, 0.7);
    letter-spacing: 4px;
  }

  .info-note {
    font-weight: 300;
    font-size: 21px;
    color: rgba(210, 190, 145, 0.35);
    letter-spacing: 3px;
    margin-top: 18px;
  }

  /* QR Code */
  .qr-section {
    position: absolute;
    bottom: 100px;
    right: 80px;
    z-index: 15;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .qr-box {
    width: 130px;
    height: 130px;
    background: rgba(255, 252, 245, 0.92);
    border-radius: 10px;
    padding: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }

  .qr-box svg {
    width: 100%;
    height: 100%;
  }

  .qr-label {
    font-weight: 300;
    font-size: 18px;
    color: rgba(210, 190, 145, 0.5);
    letter-spacing: 2px;
  }

  /* Frame */
  .frame {
    position: absolute;
    inset: 36px;
    border: 1px solid rgba(220, 200, 160, 0.07);
    z-index: 20;
    pointer-events: none;
  }

  .corner {
    position: absolute;
    width: 26px;
    height: 26px;
    z-index: 21;
    pointer-events: none;
  }

  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: rgba(220, 200, 160, 0.2);
  }

  .corner::before { width: 26px; height: 1px; }
  .corner::after  { width: 1px; height: 26px; }

  .corner.tl { top: 34px; left: 34px; }
  .corner.tl::before { top: 0; left: 0; }
  .corner.tl::after  { top: 0; left: 0; }

  .corner.tr { top: 34px; right: 34px; }
  .corner.tr::before { top: 0; right: 0; }
  .corner.tr::after  { top: 0; right: 0; }

  .corner.bl { bottom: 34px; left: 34px; }
  .corner.bl::before { bottom: 0; left: 0; }
  .corner.bl::after  { bottom: 0; left: 0; }

  .corner.br { bottom: 34px; right: 34px; }
  .corner.br::before { bottom: 0; right: 0; }
  .corner.br::after  { bottom: 0; right: 0; }
</style>
</head>
<body>

<div class="poster">

  <!-- ===== BACKGROUND SCENE ===== -->
  <div class="scene-bg">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" preserveAspectRatio="xMidYMid slice">
      <defs>
        <!-- Hopeful dawn sky - deep indigo to golden peach -->
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#080a12"/>
          <stop offset="12%"  stop-color="#0e1220"/>
          <stop offset="22%"  stop-color="#1a1e38"/>
          <stop offset="30%"  stop-color="#2a2850"/>
          <stop offset="36%"  stop-color="#3d3060"/>
          <stop offset="41%"  stop-color="#5a3858"/>
          <stop offset="45%"  stop-color="#7a4548"/>
          <stop offset="48%"  stop-color="#a86040"/>
          <stop offset="51%"  stop-color="#c88040"/>
          <stop offset="54%"  stop-color="#daa048"/>
          <stop offset="57%"  stop-color="#e0b858"/>
          <stop offset="60%"  stop-color="#c89040"/>
          <stop offset="66%"  stop-color="#7a4838"/>
          <stop offset="75%"  stop-color="#2a1810"/>
          <stop offset="100%" stop-color="#0a0806"/>
        </linearGradient>

        <!-- Sun - rising behind tomb -->
        <radialGradient id="sunDisc" cx="50%" cy="49%" r="6%">
          <stop offset="0%"  stop-color="#fffbe8" stop-opacity="0.85"/>
          <stop offset="40%" stop-color="#f5d880" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="#f5d880" stop-opacity="0"/>
        </radialGradient>

        <radialGradient id="sunHalo1" cx="50%" cy="49%" r="16%">
          <stop offset="0%"  stop-color="#ffe8a0" stop-opacity="0.3"/>
          <stop offset="50%" stop-color="#e0b050" stop-opacity="0.1"/>
          <stop offset="100%" stop-color="#e0b050" stop-opacity="0"/>
        </radialGradient>

        <radialGradient id="sunHalo2" cx="50%" cy="49%" r="28%">
          <stop offset="0%"  stop-color="#ffd878" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#ffd878" stop-opacity="0"/>
        </radialGradient>

        <!-- Tomb interior warm light -->
        <radialGradient id="tombInner" cx="50%" cy="35%" r="55%">
          <stop offset="0%"  stop-color="#fffdf0" stop-opacity="0.95"/>
          <stop offset="30%" stop-color="#f5d898" stop-opacity="0.65"/>
          <stop offset="70%" stop-color="#c89040" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="#0a0806" stop-opacity="0"/>
        </radialGradient>

        <!-- Light spill from tomb -->
        <radialGradient id="tombSpill" cx="50%" cy="20%" r="80%" fx="50%" fy="10%">
          <stop offset="0%"  stop-color="#fff5d8" stop-opacity="0.65"/>
          <stop offset="40%" stop-color="#f0d080" stop-opacity="0.28"/>
          <stop offset="100%" stop-color="#f0d080" stop-opacity="0"/>
        </radialGradient>

        <!-- Hill fills -->
        <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#3a2a30"/>
          <stop offset="100%" stop-color="#1a1018"/>
        </linearGradient>

        <linearGradient id="hillMid" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#281810"/>
          <stop offset="100%" stop-color="#100a08"/>
        </linearGradient>

        <linearGradient id="hillFront" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#181008"/>
          <stop offset="100%" stop-color="#0a0806"/>
        </linearGradient>

        <!-- Stone gradient -->
        <linearGradient id="stoneGrad" x1="0.3" y1="0" x2="0.8" y2="1">
          <stop offset="0%"  stop-color="#2a1e14"/>
          <stop offset="50%" stop-color="#1e1410"/>
          <stop offset="100%" stop-color="#14100c"/>
        </linearGradient>

        <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
        <filter id="blur6"><feGaussianBlur stdDeviation="6"/></filter>
        <filter id="blur12"><feGaussianBlur stdDeviation="12"/></filter>
        <filter id="blur20"><feGaussianBlur stdDeviation="20"/></filter>

        <!-- Cloth wrap linen texture -->
        <pattern id="linenTexture" width="6" height="6" patternUnits="userSpaceOnUse">
          <rect width="6" height="6" fill="none"/>
          <line x1="0" y1="3" x2="6" y2="3" stroke="#d8c8a0" stroke-width="0.3" opacity="0.15"/>
        </pattern>
      </defs>

      <!-- ===== SKY ===== -->
      <rect width="1080" height="1920" fill="url(#sky)"/>

      <!-- Stars - fading in the dawn -->
      <g fill="#d0c8e0" opacity="0.2">
        <circle cx="90"  cy="60"  r="1.5"/>
        <circle cx="250" cy="35"  r="1"/>
        <circle cx="410" cy="90"  r="1.3"/>
        <circle cx="540" cy="25"  r="1.2"/>
        <circle cx="700" cy="55"  r="1.5"/>
        <circle cx="830" cy="80"  r="1"/>
        <circle cx="970" cy="30"  r="1.3"/>
        <circle cx="180" cy="150" r="0.8"/>
        <circle cx="620" cy="130" r="1"/>
        <circle cx="900" cy="160" r="0.8"/>
        <circle cx="350" cy="180" r="0.7"/>
        <circle cx="780" cy="200" r="0.9"/>
      </g>
      <g fill="#c8c0d8" opacity="0.1">
        <circle cx="150" cy="250" r="0.8"/>
        <circle cx="480" cy="220" r="0.7"/>
        <circle cx="1020" cy="120" r="1"/>
        <circle cx="60"  cy="300" r="0.6"/>
        <circle cx="950" cy="280" r="0.7"/>
      </g>

      <!-- Thin cloud wisps in upper sky -->
      <g opacity="0.06" filter="url(#blur6)">
        <ellipse cx="300" cy="200" rx="200" ry="8" fill="#a090c0"/>
        <ellipse cx="750" cy="160" rx="180" ry="6" fill="#a090c0"/>
        <ellipse cx="500" cy="280" rx="250" ry="10" fill="#9080b0"/>
        <ellipse cx="150" cy="320" rx="140" ry="7" fill="#8070a0"/>
      </g>

      <!-- Dawn color bands at horizon -->
      <g opacity="0.15" filter="url(#blur12)">
        <rect x="0" y="830" width="1080" height="60" fill="#e0a050"/>
        <rect x="0" y="800" width="1080" height="40" fill="#d08848"/>
        <rect x="0" y="870" width="1080" height="50" fill="#c07840"/>
      </g>

      <!-- Sun disc & halos -->
      <rect width="1080" height="1920" fill="url(#sunHalo2)"/>
      <rect width="1080" height="1920" fill="url(#sunHalo1)"/>
      <rect width="1080" height="1920" fill="url(#sunDisc)"/>

      <!-- Cool-white inner halo for cold/warm contrast at sun core -->
      <circle cx="540" cy="940" r="45" fill="#e0ecff" opacity="0.08" filter="url(#blur12)"/>
      <circle cx="540" cy="940" r="20" fill="#ffffff" opacity="0.06" filter="url(#blur6)"/>

      <!-- God rays from sun -->
      <g opacity="0.12" filter="url(#blur3)">
        <polygon points="540,900 490,200 510,200" fill="#ffd878"/>
        <polygon points="540,900 560,100 585,100" fill="#ffd878" opacity="0.8"/>
        <polygon points="540,900 680,150 710,150" fill="#ffd878" opacity="0.6"/>
