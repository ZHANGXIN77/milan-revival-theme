name: 部署主题到 GoDaddy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SFTP 部署到 GoDaddy
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 通过 SFTP 部署主题到 GoDaddy
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          source: "./"
          target: "wp-content/themes/milan-revival-theme"
          rm: false
