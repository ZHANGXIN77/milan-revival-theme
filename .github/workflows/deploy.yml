name: 部署主题到 GoDaddy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SFTP 部署到 GoDaddy
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 lftp
        run: sudo apt-get install -y lftp

      - name: 通过 SFTP 部署主题到 GoDaddy
        run: |
          lftp -u "$SFTP_USERNAME,$SFTP_PASSWORD" \
            -e "set sftp:connect-program \'ssh -p 22 -o StrictHostKeyChecking=no\'; \
                mirror -R --verbose \
                  --exclude=\'.git.*\' \
                  --exclude=\'.github/\' \
                  --exclude=\'DEPLOYMENT_GUIDE.md\' \
                  . wp-content/themes/milan-revival-theme/; \
                quit" \
            sftp://$SFTP_HOST
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
