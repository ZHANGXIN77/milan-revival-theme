name: 部署主题到 GoDaddy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SFTP 部署到 GoDaddy
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 lftp 和 sshpass
        run: sudo apt-get install -y lftp sshpass

      - name: 通过 SFTP 部署主题到 GoDaddy
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          lftp -u "$SFTP_USERNAME,$SFTP_PASSWORD" sftp://$SFTP_HOST <<EOF
          set sftp:auto-confirm yes
          set net:timeout 30
          set net:max-retries 3
          mirror -R --verbose --overwrite --no-perms --exclude-glob .git* --exclude-glob .github/ . dom1113878/wp-content/themes/milan-revival-theme/
          bye
          EOF
