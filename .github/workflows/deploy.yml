name: 部署主题到 GoDaddy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SFTP 部署到 GoDaddy
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装工具
        run: sudo apt-get install -y sshpass lftp

      - name: 调试目录结构
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          echo "=== 使用 sftp 命令调试 ==="
          sshpass -p "$SFTP_PASSWORD" sftp -oBatchMode=no -oStrictHostKeyChecking=no "$SFTP_USERNAME@$SFTP_HOST" <<'SFTP_CMDS'
          pwd
          ls
          cd dom1113878/wp-content/themes
          ls
          cd milan-revival-theme
          pwd
          ls
          put front-page.php
          ls
          bye
          SFTP_CMDS
          echo "=== sftp 完成 ==="
